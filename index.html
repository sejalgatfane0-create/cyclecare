<!DOCTYPE html>
<html>
<head>
    <title>CycleCare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🌸 CycleCare</h1>
    <p>Your Personal Health Companion</p>
</header>

<div class="container">
    <h2>Track Your Cycle</h2>

    <label>Last Period Date:</label>
    <input type="date" id="lastDate">

    <label>Cycle Length (days):</label>
    <input type="number" id="cycleLength" value="28">

    <label>Select Mood:</label>
    <select id="mood">
        <option>😊 Happy</option>
        <option>😔 Sad</option>
        <option>😤 Irritated</option>
    </select>

    <button onclick="predictCycle()">Check Prediction</button>

    <div id="resultBox">
        <h3 id="result"></h3>
    </div>

    <h3>📊 History</h3>
    <ul id="history"></ul>
</div>

<footer>
    <p>© 2026 CycleCare | Made with ❤️</p>
</footer>

<script src="script.js"></script>
</body>
</html>
